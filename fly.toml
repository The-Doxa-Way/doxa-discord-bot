app = 'doxa-discord-bot'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'

[[services]]
  protocol = ''
  internal_port = 0
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  ports = []

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
